name: Daily Podcast Digest via Miaoda

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Report date, YYYY-MM-DD. Empty means today in Asia/Shanghai."
        required: false
        type: string
      dry_run_feishu:
        description: "Generate the report but do not publish to Feishu."
        required: false
        default: false
        type: boolean
  schedule:
    # 06:15 Beijing time (UTC 22:15 previous day), after the 06:00 data window closes.
    - cron: "15 22 * * *"

permissions:
  contents: read

concurrency:
  group: daily-podcast-digest-miaoda
  cancel-in-progress: false

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Resolve report date
        id: report_date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            REPORT_DATE="${{ github.event.inputs.date }}"
          else
            REPORT_DATE="$(TZ=Asia/Shanghai date +'%Y-%m-%d')"
          fi
          echo "date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          echo "REPORT_PATH=reports/daily-${REPORT_DATE}.md" >> "$GITHUB_ENV"
          echo "REPORT_JSON_PATH=reports/daily-${REPORT_DATE}.json" >> "$GITHUB_ENV"
          echo "ITEMS_PATH=reports/daily_items_${REPORT_DATE}.json" >> "$GITHUB_ENV"
          echo "MANIFEST_PATH=reports/daily_items_${REPORT_DATE}.manifest.json" >> "$GITHUB_ENV"
          echo "MIAODA_STATUS_PATH=reports/miaoda_collect_${REPORT_DATE}.status.json" >> "$GITHUB_ENV"
          echo "VALIDATION_PATH=reports/miaoda_validation_${REPORT_DATE}.json" >> "$GITHUB_ENV"
          echo "BUNDLE_PATH=subtitles_bundle.zip" >> "$GITHUB_ENV"

      - name: Check required Miaoda and LLM secrets
        shell: bash
        run: |
          test -n "${{ secrets.MIAODA_API_BASE }}"
          test -n "${{ secrets.MIAODA_API_TOKEN }}"
          test -n "${{ secrets.LLM_BASE_URL }}"
          test -n "${{ secrets.LLM_API_KEY }}"
          test -n "${{ secrets.LLM_MODEL }}"

      - name: Check required Feishu secrets
        if: ${{ github.event.inputs.dry_run_feishu != 'true' }}
        shell: bash
        run: |
          test -n "${{ secrets.FEISHU_APP_ID }}"
          test -n "${{ secrets.FEISHU_APP_SECRET }}"
          test -n "${{ secrets.FEISHU_WIKI_SPACE_ID }}"
          test -n "${{ secrets.FEISHU_NOTIFY_WEBHOOK }}"

      - name: Collect and transcribe via Miaoda
        env:
          MIAODA_API_BASE: ${{ secrets.MIAODA_API_BASE }}
          MIAODA_API_TOKEN: ${{ secrets.MIAODA_API_TOKEN }}
        run: |
          python scripts/miaoda_collect_daily.py \
            --date "$REPORT_DATE" \
            --timezone "Asia/Shanghai" \
            --sources-profile "podcast-distill-default" \
            --items-json "$ITEMS_PATH" \
            --manifest-json "$MANIFEST_PATH" \
            --bundle-path "$BUNDLE_PATH" \
            --status-json "$MIAODA_STATUS_PATH" \
            --subtitles-dir subtitles \
            --require-transcripts \
            --allow-asr \
            --poll-interval 30 \
            --timeout-seconds 18000

      - name: Validate Miaoda transcript bundle
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [ "$REPORT_DATE" = "2026-06-30" ]; then
            EXTRA_ARGS+=("--expected-url" "https://www.xiaoyuzhoufm.com/episode/6a41f1212e335a35a80b0159")
            EXTRA_ARGS+=("--expected-url" "https://www.xiaoyuzhoufm.com/episode/6a40b830ffcf45052c805d5f")
            EXTRA_ARGS+=("--expected-url" "https://www.xiaoyuzhoufm.com/episode/6a412def9d2f5743683f320e")
          fi

          python scripts/validate_miaoda_bundle.py \
            --items-json "$ITEMS_PATH" \
            --manifest-json "$MANIFEST_PATH" \
            --subtitles-dir subtitles \
            --bundle-zip "$BUNDLE_PATH" \
            --min-coverage 0.95 \
            --min-duration-seconds 300 \
            --output-json "$VALIDATION_PATH" \
            "${EXTRA_ARGS[@]}"

      - name: Generate daily report from full transcripts
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_TIMEOUT: "600"
          LLM_CHUNK_CHARS: "30000"
        run: |
          python scripts/generate_daily_report.py \
            --date "$REPORT_DATE" \
            --items-json "$ITEMS_PATH" \
            --subtitles-dir subtitles \
            --require-transcripts \
            --llm-policy required \
            --llm-max-attempts 3 \
            --output "$REPORT_PATH" \
            --output-json "$REPORT_JSON_PATH"

      - name: Install lark-cli
        if: ${{ github.event.inputs.dry_run_feishu != 'true' }}
        run: npm install -g @larksuite/cli@1.0.59

      - name: Publish to Feishu Wiki and notify group
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_SPACE_ID: ${{ secrets.FEISHU_WIKI_SPACE_ID }}
          FEISHU_NOTIFY_WEBHOOK: ${{ secrets.FEISHU_NOTIFY_WEBHOOK }}
        shell: bash
        run: |
          DRY_RUN=""
          if [ "${{ github.event.inputs.dry_run_feishu }}" = "true" ]; then
            DRY_RUN="--dry-run"
          fi
          python scripts/publish_feishu.py \
            --file "$REPORT_PATH" \
            --title "${REPORT_DATE} 播客与视频更新日报" \
            $DRY_RUN

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-${{ steps.report_date.outputs.date }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            ${{ env.REPORT_PATH }}
            ${{ env.REPORT_JSON_PATH }}
            ${{ env.ITEMS_PATH }}
            ${{ env.MANIFEST_PATH }}
            ${{ env.MIAODA_STATUS_PATH }}
            ${{ env.VALIDATION_PATH }}
            ${{ env.BUNDLE_PATH }}
            subtitles/
