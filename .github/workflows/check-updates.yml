name: Check Podcast Updates

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Check for new episodes
        id: check
        run: |
          python check_updates.py
          # 读取新节目数量
          report=$(ls reports/*.md 2>/dev/null | tail -1)
          if [ -f "$report" ]; then
            echo "Report: $report"
            cat "$report"
          fi
